<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Truck Tracking App</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js"></script>
    <script>
        // Initialize Firebase
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.appspot.com",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID",
            measurementId: "YOUR_MEASUREMENT_ID"
        };
        const app = firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Function to save truck data to Firestore
        function saveTruckData(truckId, data) {
            return db.collection('trucks').doc(truckId).set(data);
        }

        // Function to listen for real-time updates
        function listenForUpdates(truckId) {
            db.collection('trucks').doc(truckId).onSnapshot((doc) => {
                if (doc.exists) {
                    const data = doc.data();
                    // Update the UI with the latest data
                    updateUI(data);
                }
            });
        }

        function updateUI(data) {
            // Update your UI logic here
            console.log('Updated truck data:', data);
        }

        // Assuming truckId is available in your context
        const truckId = "someTruckId";
        listenForUpdates(truckId);
    </script>
</head>
<body>
    <h1>Truck Tracking App</h1>
    <p>Real-time tracking of trucks worldwide.</p>
    <!-- Add UI components here -->
</body>
</html>
